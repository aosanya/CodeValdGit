syntax = "proto3";

package codevaldgit.v1;

option go_package = "github.com/aosanya/CodeValdGit/gen/go/codevaldgit/v1;codevaldgitv1";

import "google/protobuf/timestamp.proto";

// ── Entity Messages ───────────────────────────────────────────────────────────

// Repository is a per-agency Git repository.
// An agency may own multiple Repository entities.
// agency_id is the entitygraph ID of the owning Agency (resolved from the
// belongs_to_agency edge). The GitService is scoped per-agency at construction
// time — agency_id is populated in responses for callers that need it.
message Repository {
  string                    id             = 1;
  string                    agency_id      = 2;
  string                    name           = 3;
  string                    description    = 4;
  string                    default_branch = 5;
  google.protobuf.Timestamp created_at     = 6;
  google.protobuf.Timestamp updated_at     = 7;
}

// Branch is a named ref pointing to a Commit entity.
// Task branches follow the naming convention "task/{task_id}".
message Branch {
  string                    id             = 1;
  string                    repository_id  = 2;
  string                    name           = 3;
  bool                      is_default     = 4;
  string                    head_commit_id = 5;
  google.protobuf.Timestamp created_at     = 6;
  google.protobuf.Timestamp updated_at     = 7;
}

// Tag is an immutable named ref pointing to a Commit entity.
// Once created the target commit never changes.
message Tag {
  string                    id            = 1;
  string                    repository_id = 2;
  string                    name          = 3;
  string                    sha           = 4;
  string                    message       = 5;
  string                    tagger_name   = 6;
  google.protobuf.Timestamp tagger_at     = 7;
  google.protobuf.Timestamp created_at    = 8;
}

// Commit is an immutable git commit entity stored in the entity graph.
// Content-addressed by sha; never mutated after creation.
message Commit {
  string                    id              = 1;
  string                    repository_id   = 2;
  string                    sha             = 3;
  string                    message         = 4;
  string                    author_name     = 5;
  string                    author_email    = 6;
  google.protobuf.Timestamp author_at       = 7;
  string                    committer_name  = 8;
  string                    committer_email = 9;
  google.protobuf.Timestamp committed_at    = 10;
  string                    tree_id         = 11;
  repeated string           parent_ids      = 12;
  google.protobuf.Timestamp created_at      = 13;
}

// Blob is an immutable file-content entity stored in the entity graph.
// Content-addressed by sha; never mutated after creation.
// Text content is stored as-is; binary content is base64-encoded with
// encoding set to "base64".
message Blob {
  string                    id         = 1;
  string                    sha        = 2;
  string                    path       = 3;
  int64                     size       = 4;
  string                    encoding   = 5;
  string                    content    = 6;
  string                    tree_id    = 7;
  google.protobuf.Timestamp created_at = 8;
}

// CommitEntry is a lightweight commit summary used in Log responses.
// It omits tree/blob references for efficiency.
message CommitEntry {
  string                    sha       = 1;
  string                    author    = 2;
  string                    message   = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// FileEntry is a single item returned by ListDirectory.
message FileEntry {
  string name   = 1;
  string path   = 2;
  bool   is_dir = 3;
  int64  size   = 4;
}

// FileDiff describes the changes to one file between two refs.
message FileDiff {
  string path      = 1;
  string operation = 2;
  string patch     = 3;
}

// ── Service ───────────────────────────────────────────────────────────────────

// GitService is the single gRPC service exposed by CodeValdGit.
// All operations are scoped to the agency that owns this database instance.
// The agency_id is determined at server construction time and is not passed
// per-call (see CodeValdAI for the same pattern).
service GitService {

  // ── Repository Lifecycle ──────────────────────────────────────────────────

  // InitRepo creates a new Repository entity for this agency.
  // Error: ALREADY_EXISTS if a repository with the same name already exists.
  rpc InitRepo (InitRepoRequest) returns (Repository);

  // ListRepositories returns all Repository entities for this agency.
  rpc ListRepositories (ListRepositoriesRequest) returns (ListRepositoriesResponse);

  // GetRepository retrieves a Repository entity by its ID.
  // Error: NOT_FOUND if no repository with that ID exists.
  rpc GetRepository (GetRepositoryRequest) returns (Repository);

  // DeleteRepo marks the specified repository entity as archived (soft delete).
  // Error: NOT_FOUND if no repository with that ID exists.
  rpc DeleteRepo (DeleteRepoRequest) returns (DeleteRepoResponse);

  // PurgeRepo permanently removes all data for the specified repository.
  // Irreversible. Error: NOT_FOUND if no repository with that ID exists.
  rpc PurgeRepo (PurgeRepoRequest) returns (PurgeRepoResponse);

  // ── Branch Management ─────────────────────────────────────────────────────

  // CreateBranch creates a new Branch entity from the specified source.
  // Error: ALREADY_EXISTS if a branch with the given name exists.
  // Error: NOT_FOUND if from_branch_id is non-empty and not found.
  rpc CreateBranch (CreateBranchRequest) returns (Branch);

  // GetBranch retrieves a Branch entity by its ID.
  // Error: NOT_FOUND if no branch with that ID exists.
  rpc GetBranch (GetBranchRequest) returns (Branch);

  // ListBranches returns all Branch entities for the specified repository.
  rpc ListBranches (ListBranchesRequest) returns (ListBranchesResponse);

  // DeleteBranch removes a Branch entity.
  // Error: NOT_FOUND if no branch with that ID exists.
  // Error: FAILED_PRECONDITION if branch is the repository default branch.
  rpc DeleteBranch (DeleteBranchRequest) returns (DeleteBranchResponse);

  // MergeBranch merges the given branch into the repository default branch.
  // Returns the updated default Branch on success.
  // Error: ABORTED with MergeConflictInfo detail on content conflict.
  // Error: NOT_FOUND if no branch with that ID exists.
  rpc MergeBranch (MergeBranchRequest) returns (Branch);

  // ── Tag Management ────────────────────────────────────────────────────────

  // CreateTag creates an immutable Tag entity pointing to the specified commit.
  // Error: ALREADY_EXISTS if a tag with the given name exists.
  rpc CreateTag (CreateTagRequest) returns (Tag);

  // GetTag retrieves a Tag entity by its ID.
  // Error: NOT_FOUND if no tag with that ID exists.
  rpc GetTag (GetTagRequest) returns (Tag);

  // ListTags returns all Tag entities for the specified repository.
  rpc ListTags (ListTagsRequest) returns (ListTagsResponse);

  // DeleteTag removes a Tag entity.
  // Error: NOT_FOUND if no tag with that ID exists.
  rpc DeleteTag (DeleteTagRequest) returns (DeleteTagResponse);

  // ── File Operations ───────────────────────────────────────────────────────

  // WriteFile commits a file to the specified branch and returns the Commit
  // entity created by this write.
  // Error: NOT_FOUND if the branch does not exist.
  rpc WriteFile (WriteFileRequest) returns (Commit);

  // ReadFile retrieves the Blob entity for a file at the branch's current HEAD.
  // Error: NOT_FOUND if the branch or file path does not exist.
  rpc ReadFile (ReadFileRequest) returns (Blob);

  // DeleteFile removes a file from the specified branch as a new commit and
  // returns the deletion Commit entity.
  // Error: NOT_FOUND if the branch or file path does not exist.
  rpc DeleteFile (DeleteFileRequest) returns (Commit);

  // ListDirectory returns immediate children at the given path on the branch.
  // Error: NOT_FOUND if the branch or path does not exist.
  rpc ListDirectory (ListDirectoryRequest) returns (ListDirectoryResponse);

  // ── History ───────────────────────────────────────────────────────────────

  // Log returns the commit history for the branch, newest first.
  // Optionally filtered to a specific file path and capped by limit.
  // Error: NOT_FOUND if the branch does not exist.
  rpc Log (LogRequest) returns (LogResponse);

  // Diff returns per-file change summaries between two refs.
  // Refs may be branch IDs or commit SHAs.
  // Error: NOT_FOUND if either ref cannot be resolved.
  rpc Diff (DiffRequest) returns (DiffResponse);

  // ImportRepo begins an async import of a public Git repository.
  // Returns immediately with a job ID; poll GetImportStatus for progress.
  // Error: ALREADY_EXISTS if a repository with the same name already exists.
  // Error: FAILED_PRECONDITION if an import is already in progress.
  rpc ImportRepo (ImportRepoRequest) returns (ImportRepoResponse);

  // GetImportStatus returns the current state of an import job.
  // Error: NOT_FOUND if no job with the given ID exists.
  rpc GetImportStatus (GetImportStatusRequest) returns (ImportJobResponse);

  // CancelImport cancels a pending or running import job.
  // Error: NOT_FOUND if no job with the given ID exists.
  // Error: FAILED_PRECONDITION if the job is already in a terminal state.
  rpc CancelImport (CancelImportRequest) returns (CancelImportResponse);
}

// ── Request / Response Messages ───────────────────────────────────────────────

// Repository lifecycle

message InitRepoRequest {
  string name           = 1;
  string description    = 2;
  string default_branch = 3;
}

message ListRepositoriesRequest {}
message ListRepositoriesResponse {
  repeated Repository repositories = 1;
}

message GetRepositoryRequest {
  string repository_id = 1;
}

message DeleteRepoRequest {
  string repository_id = 1;
}
message DeleteRepoResponse {}

message PurgeRepoRequest {
  string repository_id = 1;
}
message PurgeRepoResponse {}

// Branch management

message CreateBranchRequest {
  string repository_id  = 1;
  string name           = 2;
  string from_branch_id = 3;
}

message GetBranchRequest {
  string branch_id = 1;
}

message ListBranchesRequest {
  string repository_id = 1;
}
message ListBranchesResponse {
  repeated Branch branches = 1;
}

message DeleteBranchRequest {
  string branch_id = 1;
}
message DeleteBranchResponse {}

message MergeBranchRequest {
  string branch_id = 1;
}

// Tag management

message CreateTagRequest {
  string repository_id = 1;
  string name          = 2;
  string commit_id     = 3;
  string message       = 4;
  string tagger_name   = 5;
}

message GetTagRequest {
  string tag_id = 1;
}

message ListTagsRequest {
  string repository_id = 1;
}
message ListTagsResponse {
  repeated Tag tags = 1;
}

message DeleteTagRequest {
  string tag_id = 1;
}
message DeleteTagResponse {}

// File operations

message WriteFileRequest {
  string branch_id    = 1;
  string path         = 2;
  string content      = 3;
  string encoding     = 4;
  string author_name  = 5;
  string author_email = 6;
  string message      = 7;
}

message ReadFileRequest {
  string branch_id = 1;
  string path      = 2;
}

message DeleteFileRequest {
  string branch_id    = 1;
  string path         = 2;
  string author_name  = 3;
  string author_email = 4;
  string message      = 5;
}

message ListDirectoryRequest {
  string branch_id = 1;
  string path      = 2;
}
message ListDirectoryResponse {
  repeated FileEntry entries = 1;
}

// History

message LogRequest {
  string branch_id = 1;
  string path      = 2;
  int32  limit     = 3;
}
message LogResponse {
  repeated CommitEntry commits = 1;
}

message DiffRequest {
  string from_ref = 1;
  string to_ref   = 2;
}
message DiffResponse {
  repeated FileDiff diffs = 1;
}
// Import

message ImportRepoRequest {
  string agency_id      = 1;
  string name           = 2;
  string description    = 3;
  string source_url     = 4;
  string default_branch = 5;
}
message ImportRepoResponse {
  string job_id = 1;
}

message GetImportStatusRequest {
  string agency_id = 1;
  string job_id    = 2;
}

message CancelImportRequest {
  string agency_id = 1;
  string job_id    = 2;
}
message CancelImportResponse {}

message ImportJobResponse {
  string job_id        = 1;
  string agency_id     = 2;
  string source_url    = 3;
  string status        = 4;
  string error_message = 5;
  string created_at    = 6;
  string updated_at    = 7;
}