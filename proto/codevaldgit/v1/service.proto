syntax = "proto3";

package codevaldgit.v1;

option go_package = "github.com/aosanya/CodeValdGit/gen/go/codevaldgit/v1;codevaldgitv1";

import "google/protobuf/timestamp.proto";

// ── Entity Messages ───────────────────────────────────────────────────────────

// Repository is a per-agency Git repository.
// An agency may own multiple Repository entities.
// agency_id is the entitygraph ID of the owning Agency (resolved from the
// belongs_to_agency edge). The GitService is scoped per-agency at construction
// time — agency_id is populated in responses for callers that need it.
message Repository {
  string                    id             = 1;
  string                    agency_id      = 2;
  string                    name           = 3;
  string                    description    = 4;
  string                    default_branch = 5;
  google.protobuf.Timestamp created_at     = 6;
  google.protobuf.Timestamp updated_at     = 7;
  string                    source_url     = 8;
}

// Branch is a named ref pointing to a Commit entity.
// Task branches follow the naming convention "task/{task_id}".
message Branch {
  string                    id             = 1;
  string                    repository_id  = 2;
  string                    name           = 3;
  bool                      is_default     = 4;
  string                    head_commit_id = 5;
  google.protobuf.Timestamp created_at     = 6;
  google.protobuf.Timestamp updated_at     = 7;
}

// Tag is an immutable named ref pointing to a Commit entity.
// Once created the target commit never changes.
message Tag {
  string                    id            = 1;
  string                    repository_id = 2;
  string                    name          = 3;
  string                    sha           = 4;
  string                    message       = 5;
  string                    tagger_name   = 6;
  google.protobuf.Timestamp tagger_at     = 7;
  google.protobuf.Timestamp created_at    = 8;
}

// Commit is an immutable git commit entity stored in the entity graph.
// Content-addressed by sha; never mutated after creation.
message Commit {
  string                    id              = 1;
  string                    repository_id   = 2;
  string                    sha             = 3;
  string                    message         = 4;
  string                    author_name     = 5;
  string                    author_email    = 6;
  google.protobuf.Timestamp author_at       = 7;
  string                    committer_name  = 8;
  string                    committer_email = 9;
  google.protobuf.Timestamp committed_at    = 10;
  string                    tree_id         = 11;
  repeated string           parent_ids      = 12;
  google.protobuf.Timestamp created_at      = 13;
}

// Blob is an immutable file-content entity stored in the entity graph.
// Content-addressed by sha; never mutated after creation.
// Text content is stored as-is; binary content is base64-encoded with
// encoding set to "base64".
message Blob {
  string                    id         = 1;
  string                    sha        = 2;
  string                    path       = 3;
  int64                     size       = 4;
  string                    encoding   = 5;
  string                    content    = 6;
  string                    tree_id    = 7;
  google.protobuf.Timestamp created_at = 8;
}

// CommitEntry is a lightweight commit summary used in Log responses.
// It omits tree/blob references for efficiency.
message CommitEntry {
  string                    sha       = 1;
  string                    author    = 2;
  string                    message   = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// FileEntry is a single item returned by ListDirectory.
message FileEntry {
  string name   = 1;
  string path   = 2;
  bool   is_dir = 3;
  int64  size   = 4;
}

// FileDiff describes the changes to one file between two refs.
message FileDiff {
  string path      = 1;
  string operation = 2;
  string patch     = 3;
}

// ── Service ───────────────────────────────────────────────────────────────────

// GitService is the single gRPC service exposed by CodeValdGit.
// All operations are scoped to the agency that owns this database instance.
// The agency_id is determined at server construction time and is not passed
// per-call (see CodeValdAI for the same pattern).
service GitService {

  // ── Repository Lifecycle ──────────────────────────────────────────────────

  // InitRepo creates a new Repository entity for this agency.
  // Error: ALREADY_EXISTS if a repository with the same name already exists.
  rpc InitRepo (InitRepoRequest) returns (Repository);

  // ListRepositories returns all Repository entities for this agency.
  rpc ListRepositories (ListRepositoriesRequest) returns (ListRepositoriesResponse);

  // GetRepository retrieves a Repository entity by its ID.
  // Error: NOT_FOUND if no repository with that ID exists.
  rpc GetRepository (GetRepositoryRequest) returns (Repository);

  // GetRepositoryByName retrieves a Repository entity by its human-readable name.
  // Error: NOT_FOUND if no repository with that name exists.
  rpc GetRepositoryByName (GetRepositoryByNameRequest) returns (Repository);

  // DeleteRepo marks the specified repository entity as archived (soft delete).
  // Error: NOT_FOUND if no repository with that ID exists.
  rpc DeleteRepo (DeleteRepoRequest) returns (DeleteRepoResponse);

  // PurgeRepo permanently removes all data for the specified repository.
  // Irreversible. Error: NOT_FOUND if no repository with that ID exists.
  rpc PurgeRepo (PurgeRepoRequest) returns (PurgeRepoResponse);

  // ── Branch Management ─────────────────────────────────────────────────────

  // CreateBranch creates a new Branch entity from the specified source.
  // Error: ALREADY_EXISTS if a branch with the given name exists.
  // Error: NOT_FOUND if from_branch_id is non-empty and not found.
  rpc CreateBranch (CreateBranchRequest) returns (Branch);

  // GetBranch retrieves a Branch entity by its ID.
  // Error: NOT_FOUND if no branch with that ID exists.
  rpc GetBranch (GetBranchRequest) returns (Branch);

  // GetBranchByName retrieves a Branch entity by its human-readable name
  // within the given repository. Falls back to ID-based lookup for callers
  // that have not yet migrated to name-based URLs.
  // Error: NOT_FOUND if no branch with that name exists in the repository.
  rpc GetBranchByName (GetBranchByNameRequest) returns (Branch);

  // ListBranches returns all Branch entities for the specified repository.
  rpc ListBranches (ListBranchesRequest) returns (ListBranchesResponse);

  // DeleteBranch removes a Branch entity.
  // Error: NOT_FOUND if no branch with that ID exists.
  // Error: FAILED_PRECONDITION if branch is the repository default branch.
  rpc DeleteBranch (DeleteBranchRequest) returns (DeleteBranchResponse);

  // MergeBranch merges the given branch into the repository default branch.
  // Returns the updated default Branch on success.
  // Error: ABORTED with MergeConflictInfo detail on content conflict.
  // Error: NOT_FOUND if no branch with that ID exists.
  rpc MergeBranch (MergeBranchRequest) returns (Branch);

  // ── Tag Management ────────────────────────────────────────────────────────

  // CreateTag creates an immutable Tag entity pointing to the specified commit.
  // Error: ALREADY_EXISTS if a tag with the given name exists.
  rpc CreateTag (CreateTagRequest) returns (Tag);

  // GetTag retrieves a Tag entity by its ID.
  // Error: NOT_FOUND if no tag with that ID exists.
  rpc GetTag (GetTagRequest) returns (Tag);

  // ListTags returns all Tag entities for the specified repository.
  rpc ListTags (ListTagsRequest) returns (ListTagsResponse);

  // DeleteTag removes a Tag entity.
  // Error: NOT_FOUND if no tag with that ID exists.
  rpc DeleteTag (DeleteTagRequest) returns (DeleteTagResponse);

  // ── File Operations ───────────────────────────────────────────────────────

  // WriteFile commits a file to the specified branch and returns the Commit
  // entity created by this write.
  // Error: NOT_FOUND if the branch does not exist.
  rpc WriteFile (WriteFileRequest) returns (Commit);

  // ReadFile retrieves the Blob entity for a file at the branch's current HEAD.
  // Error: NOT_FOUND if the branch or file path does not exist.
  rpc ReadFile (ReadFileRequest) returns (Blob);

  // DeleteFile removes a file from the specified branch as a new commit and
  // returns the deletion Commit entity.
  // Error: NOT_FOUND if the branch or file path does not exist.
  rpc DeleteFile (DeleteFileRequest) returns (Commit);

  // ListDirectory returns immediate children at the given path on the branch.
  // Error: NOT_FOUND if the branch or path does not exist.
  rpc ListDirectory (ListDirectoryRequest) returns (ListDirectoryResponse);

  // ── History ───────────────────────────────────────────────────────────────

  // Log returns the commit history for the branch, newest first.
  // Optionally filtered to a specific file path and capped by limit.
  // Error: NOT_FOUND if the branch does not exist.
  rpc Log (LogRequest) returns (LogResponse);

  // Diff returns per-file change summaries between two refs.
  // Refs may be branch IDs or commit SHAs.
  // Error: NOT_FOUND if either ref cannot be resolved.
  rpc Diff (DiffRequest) returns (DiffResponse);

  // ImportRepo begins an async import of a public Git repository.
  // Returns immediately with a job ID; poll GetImportStatus for progress.
  // Error: ALREADY_EXISTS if a repository with the same name already exists.
  // Error: FAILED_PRECONDITION if an import is already in progress.
  rpc ImportRepo (ImportRepoRequest) returns (ImportRepoResponse);

  // GetImportStatus returns the current state of an import job.
  // Error: NOT_FOUND if no job with the given ID exists.
  rpc GetImportStatus (GetImportStatusRequest) returns (ImportJobResponse);

  // CancelImport cancels a pending or running import job.
  // Error: NOT_FOUND if no job with the given ID exists.
  // Error: FAILED_PRECONDITION if the job is already in a terminal state.
  rpc CancelImport (CancelImportRequest) returns (CancelImportResponse);

  // ── On-Demand Branch Fetch (GIT-023f) ────────────────────────────────────

  // FetchBranch begins an async on-demand fetch for a previously imported
  // stub branch, materialising its full commit history and file tree.
  // Returns immediately with a FetchBranchJob; poll GetFetchBranchStatus for
  // progress.
  // Error: NOT_FOUND if the repository or branch does not exist.
  // Error: FAILED_PRECONDITION (ErrBranchAlreadyFetched) if the branch status
  // is already "fetched".
  rpc FetchBranch (FetchBranchRequest) returns (FetchBranchJob);

  // GetFetchBranchStatus returns the current state of a branch fetch job.
  // Error: NOT_FOUND if no job with the given ID exists.
  rpc GetFetchBranchStatus (GetFetchBranchStatusRequest) returns (FetchBranchJob);

  // ── Keyword CRUD (GIT-021a) ───────────────────────────────────────────────

  // CreateKeyword creates a new Keyword entity in the taxonomy.
  // Error: ALREADY_EXISTS if a keyword with the same name exists under the same parent.
  // Error: NOT_FOUND if parent_id is set and does not exist.
  rpc CreateKeyword (CreateKeywordRequest) returns (Keyword);

  // GetKeyword retrieves a Keyword entity by its ID.
  // Error: NOT_FOUND if no keyword with that ID exists.
  rpc GetKeyword (GetKeywordRequest) returns (Keyword);

  // ListKeywords returns Keyword entities matching the given filter.
  // When parent_id is empty, root keywords are returned.
  rpc ListKeywords (ListKeywordsRequest) returns (ListKeywordsResponse);

  // GetKeywordTree returns the full taxonomy subtree rooted at keyword_id,
  // or the full forest of root keywords when keyword_id is empty.
  rpc GetKeywordTree (GetKeywordTreeRequest) returns (GetKeywordTreeResponse);

  // UpdateKeyword updates mutable fields of a Keyword entity.
  // Error: NOT_FOUND if no keyword with that ID exists.
  rpc UpdateKeyword (UpdateKeywordRequest) returns (Keyword);

  // DeleteKeyword removes a Keyword entity and re-roots its children.
  // Error: NOT_FOUND if no keyword with that ID exists.
  rpc DeleteKeyword (DeleteKeywordRequest) returns (DeleteKeywordResponse);

  // ── Branch-Scoped Edge CRUD (GIT-021a) ───────────────────────────────────

  // CreateEdge creates a documentation edge between two entities on a branch.
  // Error: NOT_FOUND if the branch does not exist.
  // Error: INVALID_ARGUMENT if the relationship name is not a valid edge type.
  rpc CreateEdge (CreateEdgeRequest) returns (CreateEdgeResponse);

  // DeleteEdge removes a documentation edge between two entities on a branch.
  // Error: NOT_FOUND if the branch or edge does not exist.
  // Error: INVALID_ARGUMENT if the relationship name is invalid.
  rpc DeleteEdge (DeleteEdgeRequest) returns (DeleteEdgeResponse);

  // ── Graph Queries (GIT-021a) ──────────────────────────────────────────────

  // GetNeighborhood returns all entities and edges reachable from entity_id
  // within the given depth (1-3), bounded by a 100-node hard cap.
  // Error: NOT_FOUND if the branch or entity does not exist.
  rpc GetNeighborhood (GetNeighborhoodRequest) returns (GraphResult);

  // SearchByKeywords returns entities tagged with the specified keywords,
  // optionally cascading down the keyword hierarchy.
  // Error: NOT_FOUND if the branch does not exist.
  rpc SearchByKeywords (SearchByKeywordsRequest) returns (GraphResult);

  // QueryGraph returns up to limit Blob nodes filtered across five dimensions
  // (signals, keyword_ids, file_types, folders, relationships) and sorted by
  // descending signal layer. An empty body returns the top 50 highest-signal nodes.
  // Error: NOT_FOUND if the branch does not exist.
  rpc QueryGraph (QueryGraphRequest) returns (GraphResult);
}

// ── Request / Response Messages ───────────────────────────────────────────────

// Repository lifecycle

message InitRepoRequest {
  string name           = 1;
  string description    = 2;
  string default_branch = 3;
}

message ListRepositoriesRequest {}
message ListRepositoriesResponse {
  repeated Repository repositories = 1;
}

message GetRepositoryRequest {
  string repository_id = 1;
}

message GetRepositoryByNameRequest {
  string repository_name = 1;
}

message DeleteRepoRequest {
  string repository_id   = 1;
  string repository_name = 2;
}
message DeleteRepoResponse {}

message PurgeRepoRequest {
  string repository_id   = 1;
  string repository_name = 2;
}
message PurgeRepoResponse {}

// Branch management

message CreateBranchRequest {
  string repository_id   = 1;
  string name            = 2;
  string from_branch_id  = 3;
  string repository_name = 4;
}

message GetBranchRequest {
  string branch_id = 1;
}

message GetBranchByNameRequest {
  string repository_name = 1;
  string branch_name     = 2;
}

message ListBranchesRequest {
  string repository_id   = 1;
  string repository_name = 2;
}
message ListBranchesResponse {
  repeated Branch branches = 1;
}

message DeleteBranchRequest {
  string branch_id = 1;
}
message DeleteBranchResponse {}

message MergeBranchRequest {
  string branch_id = 1;
}

// Tag management

message CreateTagRequest {
  string repository_id   = 1;
  string name            = 2;
  string commit_id       = 3;
  string message         = 4;
  string tagger_name     = 5;
  string repository_name = 6;
}

message GetTagRequest {
  string tag_id = 1;
}

message ListTagsRequest {
  string repository_id   = 1;
  string repository_name = 2;
}
message ListTagsResponse {
  repeated Tag tags = 1;
}

message DeleteTagRequest {
  string tag_id = 1;
}
message DeleteTagResponse {}

// File operations

message WriteFileRequest {
  string branch_id    = 1;
  string path         = 2;
  string content      = 3;
  string encoding     = 4;
  string author_name  = 5;
  string author_email = 6;
  string message      = 7;
}

message ReadFileRequest {
  string branch_id       = 1;
  string path            = 2;
  string repository_name = 3;
  string branch_name     = 4;
}

message DeleteFileRequest {
  string branch_id    = 1;
  string path         = 2;
  string author_name  = 3;
  string author_email = 4;
  string message      = 5;
}

message ListDirectoryRequest {
  string branch_id       = 1;
  string path            = 2;
  string repository_name = 3;
  string branch_name     = 4;
}
message ListDirectoryResponse {
  repeated FileEntry entries = 1;
}

// History

message LogRequest {
  string branch_id       = 1;
  string path            = 2;
  int32  limit           = 3;
  string repository_name = 4;
  string branch_name     = 5;
}
message LogResponse {
  repeated CommitEntry commits = 1;
}

message DiffRequest {
  string from_ref        = 1;
  string to_ref          = 2;
  string repository_name = 3;
}
message DiffResponse {
  repeated FileDiff diffs = 1;
}
// Import

message ImportRepoRequest {
  string agency_id      = 1;
  string name           = 2;
  string description    = 3;
  string source_url     = 4;
  string default_branch = 5;
}
message ImportRepoResponse {
  string job_id = 1;
}

message GetImportStatusRequest {
  string agency_id = 1;
  string job_id    = 2;
}

message CancelImportRequest {
  string agency_id = 1;
  string job_id    = 2;
}
message CancelImportResponse {}

message ImportJobResponse {
  string job_id           = 1;
  string agency_id        = 2;
  string source_url       = 3;
  string status           = 4;
  string error_message    = 5;
  string created_at       = 6;
  string updated_at       = 7;
  string name             = 8;
  string default_branch   = 9;
  repeated string progress_steps = 10;
}

// On-demand branch fetch (GIT-023f)

// FetchBranchRequest carries the parameters for an on-demand branch fetch.
message FetchBranchRequest {
  string agency_id    = 1;
  string repo_id      = 2;
  string branch_name  = 3;
}

// FetchBranchJob represents the state of an async branch fetch operation.
// Status values: "pending" | "running" | "completed" | "failed".
message FetchBranchJob {
  string id            = 1;
  string agency_id     = 2;
  string repo_id       = 3;
  string branch_name   = 4;
  string status        = 5;
  string error_message = 6;
  string created_at    = 7;
  string updated_at    = 8;
}

// GetFetchBranchStatusRequest retrieves the current state of a branch fetch job.
message GetFetchBranchStatusRequest {
  string agency_id = 1;
  string job_id    = 2;
}

// ── Keyword messages (GIT-021a) ───────────────────────────────────────────────

// Keyword is a taxonomy entity used to tag Blob entities in the documentation graph.
message Keyword {
  string          id          = 1;
  string          name        = 2;
  string          description = 3;
  string          scope       = 4;
  string          parent_id   = 5;
  repeated string child_ids   = 6;
  string          created_at  = 7;
  string          updated_at  = 8;
}

// KeywordTreeNode is a recursive node in the keyword taxonomy tree.
message KeywordTreeNode {
  Keyword                  keyword  = 1;
  repeated KeywordTreeNode children = 2;
}

message CreateKeywordRequest {
  string name        = 1;
  string description = 2;
  string scope       = 3;
  string parent_id   = 4;
}

message GetKeywordRequest {
  string keyword_id = 1;
}

message ListKeywordsRequest {
  string scope     = 1;
  string parent_id = 2;
  int32  limit     = 3;
}
message ListKeywordsResponse {
  repeated Keyword keywords = 1;
}

message GetKeywordTreeRequest {
  // keyword_id is the root of the subtree. Empty means return the full forest.
  string keyword_id = 1;
}
message GetKeywordTreeResponse {
  repeated KeywordTreeNode nodes = 1;
}

message UpdateKeywordRequest {
  string keyword_id  = 1;
  string name        = 2;
  string description = 3;
  string scope       = 4;
}

message DeleteKeywordRequest {
  string keyword_id = 1;
}
message DeleteKeywordResponse {}

// ── Branch-scoped edge messages (GIT-021a) ────────────────────────────────────

message CreateEdgeRequest {
  string branch_id          = 1;
  string from_entity_id     = 2;
  string relationship_name  = 3;
  string to_entity_id       = 4;
}
message CreateEdgeResponse {}

message DeleteEdgeRequest {
  string branch_id          = 1;
  string from_entity_id     = 2;
  string relationship_name  = 3;
  string to_entity_id       = 4;
}
message DeleteEdgeResponse {}

// ── Graph query messages (GIT-021a) ───────────────────────────────────────────

message GetNeighborhoodRequest {
  string branch_id  = 1;
  string entity_id  = 2;
  int32  depth      = 3;
}

message SearchByKeywordsRequest {
  string          branch_id  = 1;
  repeated string keywords   = 2;
  // match_mode is "AND" or "OR". Defaults to "OR".
  string          match_mode = 3;
  bool            cascade    = 4;
}

// QueryGraphRequest carries the parameters for the multi-filter graph query (GIT-026).
message QueryGraphRequest {
  string          branch_id     = 1;
  int32           limit         = 2;
  string          sort_by       = 3;
  repeated string signals       = 4;
  repeated string keyword_ids   = 5;
  repeated string file_types    = 6;
  repeated string folders       = 7;
  repeated string relationships = 8;
}

// GraphNode is a vertex in a graph query result.
message GraphNode {
  string            id         = 1;
  string            type_id    = 2;
  // properties is a JSON-encoded map of property key/value pairs.
  string            properties = 3;
}

// GraphEdge is a directed edge in a graph query result.
message GraphEdge {
  string id      = 1;
  string name    = 2;
  string from_id = 3;
  string to_id   = 4;
}

// GraphResult is the response for neighborhood and keyword search queries.
message GraphResult {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}
